services:
  postgres:
    image: postgres:16-alpine
    container_name: ormb-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ormb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ormb_password}
      POSTGRES_DB: ${POSTGRES_DB:-ormb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ormb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ormb_postgres_data:
